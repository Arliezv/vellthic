<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Profile</title>
    <link rel="icon" type="image/png" href="https://mc-heads.net/avatar/MHF_Steve">

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.waves.min.js"></script>

    <style>
        :root {
            --card-bg: linear-gradient(135deg, rgba(255, 255, 255, 0.6), rgba(255, 255, 255, 0.2));
            --item-bg: rgba(255, 255, 255, 0.45); 
            --text-main: #000000;
            --text-sub: #4b5563;
            --border: rgba(255, 255, 255, 0.8); 
            --shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            --toggle-bg: rgba(255, 255, 255, 0.8);
            --scroll-thumb: rgba(0, 0, 0, 0.2);
        }

        body.dark {
            --card-bg: linear-gradient(135deg, rgba(20, 20, 25, 0.7), rgba(20, 20, 25, 0.4));
            --item-bg: rgba(255, 255, 255, 0.05);
            --text-main: #ffffff;
            --text-sub: #a0a0a0;
            --border: rgba(255, 255, 255, 0.08);
            --shadow: 0 40px 80px rgba(0, 0, 0, 0.6);
            --toggle-bg: #333;
            --scroll-thumb: rgba(255, 255, 255, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; transition: background 0.3s, border-color 0.3s, color 0.3s, box-shadow 0.3s; }

        body {
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
            position: relative;
        }

        #vanta-bg { position: fixed; inset: 0; z-index: -1; }

        .main-card {
            width: 90%; max-width: 400px;
            max-height: 90vh;
            background: var(--card-bg);
            backdrop-filter: blur(30px) saturate(180%); 
            -webkit-backdrop-filter: blur(30px) saturate(180%);
            border: 1px solid var(--border); 
            border-radius: 32px;
            padding: 40px 25px;
            box-shadow: var(--shadow);
            text-align: center;
            position: relative;
            z-index: 10;
            animation: popUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
            display: flex; flex-direction: column;
        }

        @keyframes popUp { from { opacity: 0; transform: translateY(40px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }

        .theme-switch {
            position: absolute; top: 20px; right: 20px;
            width: 40px; height: 40px;
            background: var(--toggle-bg); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 18px; color: var(--text-main);
            border: 1px solid var(--border);
            transition: transform 0.2s;
            z-index: 20;
        }
        .theme-switch:active { transform: scale(0.9); }

        .profile-area { margin-bottom: 25px; flex-shrink: 0; }
        .avatar-container { position: relative; width: 110px; height: 110px; margin: 0 auto 15px; }
        .avatar {
            width: 100%; height: 100%; border-radius: 50%; object-fit: cover;
            border: 4px solid rgba(255,255,255,0.5);
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        h1 { font-size: 26px; font-weight: 800; color: var(--text-main); margin-bottom: 4px; letter-spacing: -0.5px; }
        .desc { font-size: 14px; color: var(--text-sub); font-weight: 500; }

        .bento-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 12px; 
            max-height: 350px; 
            overflow-y: auto;
            padding: 4px; padding-right: 8px;
        }
        .bento-grid::-webkit-scrollbar { width: 4px; }
        .bento-grid::-webkit-scrollbar-track { background: transparent; }
        .bento-grid::-webkit-scrollbar-thumb { background: var(--scroll-thumb); border-radius: 10px; }

        .link-card {
            background: var(--item-bg); border: 1px solid var(--border);
            padding: 18px; border-radius: 20px;
            text-decoration: none; color: var(--text-main);
            display: flex; flex-direction: column; justify-content: space-between;
            height: 120px; position: relative; overflow: hidden;
            transition: transform 0.2s, border-color 0.3s, box-shadow 0.3s;
            flex-shrink: 0;
            backdrop-filter: blur(5px);
        }
        .wide { grid-column: span 2; height: auto; flex-direction: row; align-items: center; padding: 20px 24px; }

        .link-card:hover { 
            transform: translateY(-4px); 
            border-color: var(--accent); 
            box-shadow: 0 15px 30px var(--glow);
            background: rgba(255,255,255,0.7);
        }
        body.dark .link-card:hover { background: rgba(255,255,255,0.1); }

        .link-card:active { transform: scale(0.98); }

        .icon-box { 
            width: 42px; height: 42px; 
            border-radius: 12px; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 20px; 
            color: #fff; background: var(--accent); 
            margin-bottom: auto; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .wide .icon-box { 
            width: 36px; height: 36px;  
            font-size: 16px;            
            margin-bottom: 0;           
            margin-right: 15px;         
            flex-shrink: 0;             
        }

        .card-info { text-align: left; }
        .card-title { font-size: 15px; font-weight: 700; display: block; }
        .card-sub { font-size: 12px; color: var(--text-sub); display: block; margin-top: 2px; }
        .arrow { position: absolute; top: 18px; right: 18px; font-size: 12px; opacity: 0.3; transition: 0.3s; }
        .wide .arrow { position: static; margin-left: auto; }
        .link-card:hover .arrow { opacity: 1; color: var(--accent); }

        footer { margin-top: 25px; font-size: 11px; color: var(--text-sub); opacity: 0.7; font-weight: 500; flex-shrink: 0; }

        .c-tt   { --accent: #141414; --glow: rgba(14, 14, 14, 0.3); }
        .c-dc   { --accent: #5865F2; --glow: rgba(88, 101, 242, 0.4); }
        .c-yt   { --accent: #FF0000; --glow: rgba(255, 0, 0, 0.4); }
        .c-wa   { --accent: #25D366; --glow: rgba(37, 211, 102, 0.4); }
        .c-dc2  { --accent: #5865F2; --glow: rgba(88, 101, 242, 0.4); }
    </style>
</head>
<body class="dark"> <div id="vanta-bg"></div>

        <div class="theme-switch" id="theme-toggle">

        <div class="profile-area">
            <div class="avatar-container">
                <img id="profile-pic" src="" class="avatar">
            </div>
            <h1 id="user-name"></h1>
            <div class="desc" id="user-bio"></div>
        </div>

        <div class="bento-grid" id="links-container"></div>

        <footer>© 2025 All Rights Reserved</footer>
    </div>

        let vantaEffect;

        function initVanta(isDark) {
            if (vantaEffect) vantaEffect.destroy();
            const colorMain = isDark ? 0x111111 : 0x607d8b; 
            const shineVal = isDark ? 35.00 : 20.00;

            vantaEffect = VANTA.WAVES({
                el: "#vanta-bg",
                mouseControls: true,
                touchControls: true,
                gyroControls: false,
                minHeight: 200.00,
                minWidth: 200.00,
                scale: 1.00,
                scaleMobile: 1.00,
                color: colorMain,
                shininess: shineVal,
                waveHeight: 20.00,
                waveSpeed: 0.75,
                zoom: 0.7
            });
        }

        document.addEventListener("DOMContentLoaded", () => {
            document.getElementById('profile-pic').src = CONFIG.profile.img;
            document.getElementById('user-name').innerText = CONFIG.profile.name;
            document.getElementById('user-bio').innerText = CONFIG.profile.bio;
            
            const container = document.getElementById('links-container');
            CONFIG.links.forEach(link => {
                const cardClass = link.type === 'wide' ? 'link-card wide' : 'link-card';
                container.innerHTML += `
                <a href="${link.url}" target="_blank" class="${cardClass} ${link.color}">
                    <div class="icon-box"><i class="fab ${link.icon}"></i></div>
                    <div class="card-info">
                        <span class="card-title">${link.name}</span>
                        <span class="card-sub">${link.sub}</span>
                    </div>
                    <i class="fas fa-arrow-right arrow"></i>
                </a>`;
            });

            const body = document.body;
            const themeBtn = document.getElementById('theme-toggle');
            const themeIcon = document.getElementById('theme-icon');
            
            let isDark = body.classList.contains('dark');
            initVanta(isDark);
            updateIcon();

            themeBtn.addEventListener('click', () => {
                body.classList.toggle('dark');
                isDark = body.classList.contains('dark');
                updateIcon();
                initVanta(isDark);
            });

            function updateIcon() {
                if (isDark) {
                    themeIcon.className = "fas fa-moon";
                } else {
                    themeIcon.className = "fas fa-sun";
                }
            }
        });
    </script>
